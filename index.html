<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>북마크 보관함</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🔖%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gamja+Flower&family=Gowun+Batang&family=Gowun+Dodum&family=Nanum+Gothic&family=Nanum+Myeongjo&family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --accent:#ff5c8a;
    --bg:#fffafc;
    --text:#3a2f33;
    --font:'Noto Sans KR',"Apple SD Gothic Neo","Malgun Gothic",sans-serif;

    --surface: color-mix(in srgb, var(--accent) 4%, var(--bg));
    --surface-2: color-mix(in srgb, var(--accent) 9%, var(--bg));
    --card: color-mix(in srgb, var(--accent) 3%, #fff);
    --border: color-mix(in srgb, var(--accent) 28%, var(--bg));
    --border-soft: color-mix(in srgb, var(--accent) 16%, var(--bg));
    --muted: color-mix(in srgb, var(--text) 45%, var(--bg));
    --accent-soft: color-mix(in srgb, var(--accent) 12%, var(--bg));
    --accent-text: #fff;
    --danger:#ff4d6d;
    --shadow: rgba(0,0,0,.08);
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; font-family:var(--font); color:var(--text);
    background:var(--bg); overflow:hidden;
    -webkit-font-smoothing:antialiased;
	text-rendering:optimizeLegibility;
  }
  button{font-family:inherit; cursor:pointer}
  a{color:var(--accent); text-decoration:none}

  .app{display:flex; height:100vh; width:100vw}

  /* ---------- 사이드바 ---------- */
  .sidebar{
    width:230px; min-width:175px; max-width:520px; flex:none;
    background:var(--surface); display:flex; flex-direction:column;
    padding:0 18px 20px; overflow:hidden; position:relative;
    transition:width .32s cubic-bezier(.4,0,.2,1), padding .32s cubic-bezier(.4,0,.2,1);
  }
  .sidebar.collapsed{width:0 !important; min-width:0 !important; padding-left:0; padding-right:0; border:none}
  .sidebar > *{transition:opacity .22s ease}
  .sidebar.collapsed > *{opacity:0}
  .resizer.collapsed{display:none}
  .logo{
    text-align:center; font-weight:800; font-size:20px; color:var(--accent);
    letter-spacing:.5px; padding:0; margin:30px 0 20px; user-select:none;
  }
  .logo img{display:block; margin:0 auto; width:auto; height:auto; max-width:min(500px,100%); max-height:500px; object-fit:contain}
  .top-actions{display:flex; gap:8px; margin-bottom:20px}
  .top-actions button{
    flex:1; padding:8px 4px; border:1px solid var(--border); border-radius:10px;
    background:transparent; color:var(--accent); font-weight:700; font-size:13px;
    transition:.15s;
  }
  .top-actions button:hover{background:var(--accent-soft)}
  .nav-item{
    padding:9px 12px; border-radius:10px; font-weight:600; font-size:14px;
    color:var(--text); display:flex; justify-content:space-between; align-items:center;
    transition:.12s; user-select:none;
  }
  .nav-item:hover{background:var(--surface-2)}
  .nav-item.active{background:var(--accent); color:var(--accent-text)}
  .nav-item .count{font-size:12px; opacity:.7}
  .nav-item.drop-hot{outline:2px dashed var(--accent); outline-offset:-2px}

  .cat-list{flex:1; overflow-y:auto; margin-top:8px; padding-right:2px}
  .cat-list::-webkit-scrollbar{width:8px}
  .cat-list::-webkit-scrollbar-thumb{background:var(--border); border-radius:8px}

  .cat{margin-bottom:4px}
  .cat-head{
    display:flex; align-items:center; gap:6px; padding:8px 8px; border-radius:9px;
    font-weight:700; font-size:14px; user-select:none;
  }
  .cat-head:hover{background:var(--surface-2)}
  .cat-head .twist{font-size:11px; transition:.15s; opacity:.6}
  .cat.collapsed .twist{transform:rotate(-90deg)}
  .cat-head .name{flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .cat-head .count{font-size:12px; color:var(--muted)}
  .cat-head .mini{opacity:0; font-size:12px; padding:0 4px; color:var(--muted)}
  .cat-head:hover .mini{opacity:.8}
  .cat-head .mini:hover{color:var(--accent)}
  .folders{padding-left:10px; overflow:hidden}
  .cat.collapsed .folders{display:none}
  .folder{
    padding:7px 10px; border-radius:9px; font-size:13.5px; display:flex; gap:6px;
    align-items:center; justify-content:space-between; color:var(--text); transition:.12s;
  }
  .folder:hover{background:var(--surface-2)}
  .folder.active{background:var(--accent); color:var(--accent-text)}
  .folder.active .count{color:var(--accent-text)}
  .folder .fname{flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .folder .count{font-size:12px; color:var(--muted)}
  .folder .mini{opacity:0; font-size:12px; padding:0 3px}
  .folder:hover .mini{opacity:.7}
  .folder.drop-hot{outline:2px dashed var(--accent); outline-offset:-2px}
  .folder-handle{
    cursor:grab; opacity:0; font-size:14px; color:var(--muted);
    padding:0 2px; line-height:1; flex-shrink:0; transition:opacity .12s;
    user-select:none;
  }
  .folder:hover .folder-handle{opacity:.5}
  .folder-handle:active{cursor:grabbing}
  .folder.folder-dragging{opacity:.4}
  .folder.folder-drop-above{border-top:2px solid var(--accent)}
  .folder.folder-drop-below{border-bottom:2px solid var(--accent)}

  .sidebar-foot{padding-top:10px; border-top:1px solid var(--border-soft); margin-top:8px}
  .foot-btn{
    width:100%; text-align:center; padding:9px; border:none; background:transparent;
    color:var(--text); font-weight:700; font-size:13.5px; border-radius:10px;
  }
  .foot-btn:hover{background:var(--surface-2); color:var(--accent)}
  .credit{text-align:center; font-size:12px; color:var(--muted); margin-top:6px}

  /* ---------- 리사이저 ---------- */
  .resizer{width:6px; flex:none; cursor:col-resize; background:transparent; position:relative}
  .resizer::after{content:""; position:absolute; left:2px; top:0; bottom:0; width:2px; background:var(--border-soft)}
  .resizer:hover::after,.resizer.drag::after{background:var(--accent)}

  /* ---------- 메인 ---------- */
  .main{flex:1; display:flex; flex-direction:column; overflow:hidden; background:var(--bg)}
  .main-head{display:flex; align-items:center; gap:16px; padding:22px 28px 10px}
  .main-title{font-size:30px; font-weight:800; color:var(--accent); margin:0; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .search{
    display:flex; align-items:center; gap:8px; border:1px solid var(--border);
    background:var(--card); border-radius:999px; padding:9px 16px; width:450px; flex-shrink:0;
  }
  .search input{border:none; outline:none; background:transparent; font-family:inherit; font-size:14px; color:var(--text); width:100%}
  .search input::placeholder{color:var(--muted)}

  .main-toolbar{display:flex; align-items:center; gap:10px; justify-content:flex-end; padding:0 28px 6px}
  .tool-btn{
    display:flex; align-items:center; gap:6px; padding:7px 14px; border:1px solid var(--border);
    border-radius:999px; background:var(--card); color:var(--accent); font-weight:700; font-size:13px;
  }
  .tool-btn:hover{background:var(--accent-soft)}
  .sortwrap{display:flex; align-items:center; gap:6px; font-size:13px; color:var(--muted)}
  .sortwrap select{
    border:1px solid var(--border); border-radius:999px; padding:7px 12px; background:var(--card);
    color:var(--text); font-family:inherit; font-size:13px; font-weight:700; outline:none; cursor:pointer;
  }
  .dup-group{border:1px solid var(--border-soft); border-radius:12px; padding:12px 14px; margin-bottom:10px; background:var(--surface)}
  .dup-group .dup-title{font-weight:700; font-size:13.5px; margin-bottom:4px; word-break:break-word}
  .dup-group .dup-meta{font-size:12px; color:var(--muted)}
  .card.reorder-hot{outline:2px dashed var(--accent); outline-offset:2px}

  /* 선택 모드 */
  .sel-bar{display:none; align-items:center; gap:8px; padding:8px 28px; background:var(--accent-soft); border-bottom:1px solid var(--border-soft); flex-wrap:wrap}
  .sel-bar.active{display:flex}
  .sel-bar-info{font-size:13px; font-weight:700; color:var(--accent); flex:1; white-space:nowrap}
  .sel-bar .tool-btn{font-size:13px}
  .card.sel-mode{cursor:pointer}
  .card.sel-mode:hover{outline:2px solid var(--accent); outline-offset:2px}
  .card.selected{outline:3px solid var(--accent); outline-offset:2px; background:var(--accent-soft)}
  .card-check{display:none; position:absolute; top:8px; left:8px; width:20px; height:20px; border-radius:6px; border:2px solid var(--accent); background:var(--card); z-index:5; align-items:center; justify-content:center; font-size:13px; pointer-events:none}
  .sel-mode .card-check{display:flex}
  .card.selected .card-check{background:var(--accent); color:var(--accent-text)}

  .cards{
    flex:1; overflow-y:auto; padding:14px 28px 40px;
    display:grid; grid-template-columns:var(--cols, repeat(auto-fill, minmax(240px, 1fr))); gap:18px; align-content:start;
  }
  .cards::-webkit-scrollbar{width:10px}
  .cards::-webkit-scrollbar-thumb{background:var(--border); border-radius:8px}

  .empty{color:var(--muted); padding:40px; text-align:center; grid-column:1/-1; font-size:15px}

  /* ---------- 카드 ---------- */
  .card{
    background:var(--card); border:1px solid var(--border-soft); border-radius:18px;
    overflow:hidden; box-shadow:0 4px 16px var(--shadow);
    transition:transform .12s, box-shadow .12s; cursor:pointer;
    display:flex; flex-direction:column; height:var(--card-h, 380px); position:relative;
  }
  .card:hover{transform:translateY(-3px); box-shadow:0 10px 24px var(--shadow)}
  .card.dragging{opacity:.4}
  .card-imgwrap{position:relative; height:130px; flex:none; background:var(--surface-2); overflow:hidden}
  .imgph{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:30px; color:var(--muted)}
  .card-img{position:relative; width:100%; height:100%; object-fit:cover; display:block}
  .card-img-logo{object-fit:contain; padding:16px; background:var(--surface-2)}
  .pill{
    background:var(--accent); color:var(--accent-text); font-size:11px; font-weight:700; line-height:1.4;
    padding:5px 10px; border-radius:999px; display:inline-flex; align-items:center;
  }
  .vid-badge{position:absolute; right:10px; top:10px; background:rgba(0,0,0,.6); color:#fff; font-size:11px; padding:3px 8px; border-radius:999px; z-index:2}
  .card-body{padding:14px 15px; display:flex; flex-direction:column; gap:8px; flex:1 1 auto; min-height:0; overflow:hidden}
  .card-tags{display:flex; gap:6px; flex-wrap:wrap; max-height:60px; overflow:hidden; align-items:center;}
  .card-author{font-size:12px; color:var(--muted);  line-height:1.5;  min-height:18px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .card-content{font-size:13.5px; line-height:1.5; color:var(--text); word-break:break-word;
    display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; white-space:pre-wrap; min-height:4.5em; max-height:4.5em;}
  .card-links{display:flex; flex-direction:column; gap:3px;}
  .card-links a{font-size:12px; display:flex; gap:6px; align-items:center; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; transition:color .12s}
  .card-links a:hover{color:color-mix(in srgb, var(--accent) 55%, var(--text)); text-decoration:underline}
  .card-foot{display:flex; align-items:center; gap:6px; padding:8px 12px; border-top:1px solid var(--border-soft); justify-content:flex-end; flex:none}
  .card-foot .left{margin-right:auto}
  .mini-btn{background:transparent; border:none; font-size:12.5px; font-weight:700; color:var(--muted); padding:4px 8px; border-radius:8px}
  .mini-btn:hover{background:var(--surface-2); color:var(--accent)}
  .mini-btn.del:hover{color:var(--danger)}
  .mini-btn.move{color:var(--accent)}

  .pager{grid-column:1/-1; display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:10px; padding:22px 4px 12px; margin-top:8px; border-top:1px solid var(--border-soft)}
  .pager-center{display:flex; flex-direction:column; align-items:center; gap:8px}
  .pager-nav{display:flex; gap:4px; align-items:center}
  .page-btn{min-width:34px; height:34px; padding:0 8px; border:1px solid var(--border); border-radius:9px; background:var(--card); color:var(--text); font-weight:700; font-size:13px}
  .page-btn:hover:not(.active):not(.dis){background:var(--accent-soft)}
  .page-btn.active{background:var(--accent); color:var(--accent-text); border-color:var(--accent)}
  .page-btn.dis{opacity:.35; cursor:default}
  .pager-pp{justify-self:end; display:flex; gap:6px}
  .pp-btn{padding:6px 13px; border:1px solid var(--border); border-radius:999px; background:var(--card); color:var(--text); font-weight:700; font-size:12.5px}
  .pp-btn:hover{background:var(--accent-soft)}
  .pp-btn.active{background:var(--accent); color:var(--accent-text); border-color:var(--accent)}
  .pager-info{font-size:12.5px; color:var(--muted)}
  .col-opts{display:flex; gap:6px; flex-wrap:wrap; margin-top:4px}

  /* ---------- 모달 ---------- */
  .overlay{position:fixed; inset:0; background:rgba(0,0,0,.38); display:none; align-items:center; justify-content:center; z-index:1000; padding:20px}
  .modal-overlay{position:fixed; inset:0; background:rgba(0,0,0,.38); display:flex; align-items:center; justify-content:center; z-index:1100; padding:20px}

  /* 토스트 알림 */
  .toast{
    position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(12px);
    background:var(--text); color:var(--bg); padding:11px 22px; border-radius:999px;
    font-size:14px; font-weight:600; white-space:nowrap; z-index:9000;
    opacity:0; transition:opacity .22s, transform .22s; pointer-events:none;
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
  .overlay.show{display:flex}
  .modal{background:var(--bg); border:1px solid var(--border); border-radius:20px; width:560px; max-width:100%; max-height:88vh; overflow:auto; padding:24px; box-shadow:0 20px 50px rgba(0,0,0,.3)}
  .modal h2{margin:0 0 16px; font-size:20px; color:var(--accent)}
  .modal label{display:block; font-size:13px; font-weight:700; margin:12px 0 5px; color:var(--text)}
  .modal input[type=text],.modal textarea,.modal select{
    width:100%; padding:9px 12px; border:1px solid var(--border); border-radius:10px;
    background:var(--card); color:var(--text); font-family:inherit; font-size:14px; outline:none;
  }
  .modal textarea{min-height:90px; resize:vertical}
  .modal .row{display:flex; gap:10px}
  .modal .row>*{flex:1}
  .modal-actions{display:flex; gap:10px; justify-content:flex-end; margin-top:22px}
  .btn{padding:10px 18px; border-radius:999px; border:1px solid var(--border); background:var(--card); color:var(--text); font-weight:700; font-size:14px; transition:.13s}
  .btn:hover{background:var(--accent-soft); color:var(--accent); border-color:var(--accent)}
  .btn.primary{background:var(--accent); color:var(--accent-text); border-color:var(--accent)}
  .btn.primary:hover{filter:brightness(1.08)}
  .btn.ghost{border:none; background:transparent; color:var(--muted)}
  .btn.ghost:hover{background:var(--surface-2); color:var(--accent)}
  .full-img{width:100%; max-height:320px; object-fit:cover; border-radius:14px; margin-bottom:14px}
  .full-img-logo{object-fit:contain; max-height:200px; padding:24px; background:var(--surface-2)}
  .full-tags{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px}
  .full-meta{font-size:13px; color:var(--muted); margin-bottom:12px}
  .full-content{font-size:15px; line-height:1.7; white-space:pre-wrap; word-break:break-word; margin-bottom:16px}
  .swatches{display:flex; gap:10px; flex-wrap:wrap; margin-top:8px; align-items:center}
  .swatch{
    width:40px; height:40px; border-radius:50%;
    border:2px solid transparent; box-shadow:0 0 0 1px var(--border);
    cursor:pointer; flex-shrink:0; overflow:hidden; position:relative;
    transition:transform .12s, box-shadow .12s;
  }
  .swatch:hover{transform:scale(1.12); box-shadow:0 0 0 2px var(--accent)}
  .swatch.sel{box-shadow:0 0 0 3px var(--accent); transform:scale(1.1)}
  .swatch-bg{ position:absolute; inset:0; width:50%; background:var(--sw-bg) }
  .swatch-accent{ position:absolute; inset:0; left:50%; background:var(--sw-accent) }
  .swatch.sel{box-shadow:0 0 0 3px var(--accent)}
  .linkrow{display:flex; gap:8px; margin-top:6px}
  .linkrow input{flex:1}
  .hint{font-size:12px; color:var(--muted); margin-top:4px}
  .size-input::-webkit-outer-spin-button,
.size-input::-webkit-inner-spin-button{
  -webkit-appearance:none;
  margin:0;
}

.size-input{
  appearance:textfield;
}
.sidebar-header{
  position:absolute;
  top:12px;
  right:12px;
  z-index:10;
}

.toggle-sidebar{
  position:absolute;
  top:10px;
  right:10px;

  width:32px;
  height:32px;

  border:none;
  border-radius:8px;

  background:var(--card);
  color:var(--accent);

  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

.toggle-sidebar:hover{
  background:var(--accent-soft);
}
.side-btn{
  width:36px;
  height:36px;

  display:flex;
  align-items:center;
  justify-content:center;

  border:1px solid var(--border);
  border-radius:10px;

  background:var(--card);
  color:var(--accent);

  font-size:18px;
  font-weight:700;

  transition:.15s;
}

.side-btn:hover{
  background:var(--accent-soft);
}
</style>
</head>
<body>
<div class="app">
  <!-- 사이드바 -->
  <aside class="sidebar" id="sidebar">
    <div class="logo" id="logo">로고</div>
    <div class="top-actions">
      <button id="btnLoad">불러오기</button>
      <button id="btnCreate">만들기</button>
    </div>
    <div class="nav-item" id="navAll" data-view="all">전체보기 <span class="count" id="cntAll">0</span></div>
    <div class="nav-item" id="navUncat" data-view="uncat" data-drop="uncat">미분류 <span class="count" id="cntUncat">0</span></div>
    <div class="cat-list" id="catList"></div>
    <div class="sidebar-foot">
      <button class="foot-btn" id="btnSettings">⚙ 환경설정</button>
      <div class="credit"><a href="https://x.com/IMYM3N4" target="_blank" rel="noopener">미나상</a></div>
      <div class="credit" style="opacity:.6;margin-top:2px">보관함 v1</div>
    </div>
  </aside>

  <div class="resizer" id="resizer"></div>

  <!-- 메인 -->
  <main class="main">
    <div class="main-head">
      <button id="toggleSidebar" class="side-btn" title="사이드바 접기/펼치기">◀</button>
      <h1 class="main-title" id="mainTitle">전체보기</h1>
      <div class="search">
        <span>🔍</span>
        <input id="searchInput" placeholder="이 폴더에서 검색">
      </div>
    </div>
    <div class="main-toolbar">
      <div class="sortwrap">정렬
        <select id="sortSel">
          <option value="new">최신순</option>
          <option value="old">오래된 순</option>
          <option value="name">이름 순</option>
          <option value="custom">사용자 지정</option>
        </select>
      </div>
      <div style="flex:1"></div>
      <button class="tool-btn" id="btnDup">⚠ 중복 확인</button>
      <button class="tool-btn" id="btnSelect">☑ 선택</button>
    </div>
    <!-- 선택 모드 액션 바 -->
    <div class="sel-bar" id="selBar">
      <span class="sel-bar-info" id="selInfo">0개 선택됨</span>
      <button class="tool-btn" id="btnSelAll">전체 선택</button>
      <button class="tool-btn" id="btnSelMove">📁 선택 이동</button>
      <button class="tool-btn" id="btnSelDel" style="color:#e05">🗑 선택 삭제</button>
      <button class="tool-btn" id="btnSelCancel">✕ 취소</button>
    </div>
    <div class="cards" id="cards"></div>
  </main>
</div>

<!-- 숨김 파일 입력 -->
<input type="file" id="csvFile" accept=".csv" style="display:none">
<input type="file" id="backupFile" accept=".json" style="display:none">
<input type="file" id="logoFile" accept=".png,.jpg,.jpeg,.gif,image/png,image/jpeg,image/gif" style="display:none">

<!-- 모달 컨테이너 -->
<div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>
<!-- 토스트 알림 -->
<div class="toast" id="toast"></div>

<script>
/* ============================================================

/* ============================================================
   CSV 파싱
   ============================================================ */
function parseCSV(text){
  if(text.charCodeAt(0)===0xFEFF) text = text.slice(1);
  const rows=[]; let row=[], cur='', q=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(q){
      if(c==='"'){ if(text[i+1]==='"'){cur+='"'; i++;} else q=false; }
      else cur+=c;
    }else{
      if(c==='"') q=true;
      else if(c===','){ row.push(cur); cur=''; }
      else if(c==='\n'){ row.push(cur); rows.push(row); row=[]; cur=''; }
      else if(c==='\r'){}
      else cur+=c;
    }
  }
  if(cur!==''||row.length){ row.push(cur); rows.push(row); }
  return rows.filter(r=>r.length>1 || (r.length===1 && r[0].trim()!==''));
}
function importCSV(text){
  const rows = parseCSV(text);
  if(!rows.length) return 0;
  const header = rows[0].map(h=>h.trim());
  const idx = (names)=>{ for(const n of names){ const i=header.findIndex(h=>h.includes(n)); if(i>=0) return i; } return -1; };
  const ci = {
    tags: idx(['태그']), author: idx(['작성자']), handle: idx(['계정']),
    content: idx(['내용']), image: idx(['이미지']), video: idx(['동영상']),
    date: idx(['날짜']), link: idx(['링크','URL']),
  };
  const existing = new Set(state.bookmarks.map(b=>b.postUrl).filter(Boolean));
  let added=0;
  for(let r=1;r<rows.length;r++){
    const row=rows[r]; if(!row || row.every(c=>!String(c).trim())) continue;
    const get=(i)=> i>=0 && row[i]!==undefined ? String(row[i]).trim() : '';
    const postUrl = get(ci.link);
    if(postUrl && existing.has(postUrl)) continue;
    const tagsRaw = get(ci.tags);
    const bm = {
      id: postUrl || uid(),
      tags: tagsRaw ? tagsRaw.split('/').map(s=>s.trim()).filter(Boolean) : [],
      author: get(ci.author), handle: get(ci.handle),
      content: get(ci.content),
      imageUrl: (get(ci.image).split('|')[0]||'').trim(),
      hasVideo: get(ci.video).toUpperCase()==='Y',
      date: get(ci.date), postUrl,
      links: [], folderId: null,
    };
    state.bookmarks.push(bm);
    if(postUrl) existing.add(postUrl);
    added++;
  }
  save(); return added;
}

/* ============================================================
   유틸
   ============================================================ */
function truncByNonSpace(s, limit){
  let count=0, out='';
  for(const ch of (s||'')){
    out+=ch;
    if(!/\s/.test(ch)) count++;
    if(count>=limit) break;
  }
  return out.length < (s||'').length ? out+'…' : out;
}
function cleanUrl(u){ return u.replace(/[)\]>。、,.!?]+$/,''); }
function detectUrls(text){
  if(!text) return [];
  const out=[];
  (text.match(/https?:\/\/[^\s)）\]]+/gi)||[]).forEach(u=>out.push(cleanUrl(u)));
  (text.match(/(?:^|[\s(\[])((?:[a-z0-9-]+\.)+[a-z]{2,}\/[^\s)）\]]+)/gi)||[]).forEach(m=>{
    let u=cleanUrl(m.replace(/^[\s(\[]+/,''));
    if(!/^https?:/i.test(u)) u='https://'+u;
    out.push(u);
  });
  return [...new Set(out)];
}
function shortUrl(u){
  let s = (u||'').replace(/^https?:\/\//,'').replace(/\/$/,'');
  return s.length>38 ? s.slice(0,38)+'…' : s;
}
function cardLinks(bm){
  const out=[...detectUrls(bm.content)];   // 내용 속 웹주소(프로토콜 유무 무관) 모두 등록
  if(bm.postUrl) out.push(bm.postUrl);     // 게시글 주소
  (bm.links||[]).forEach(u=>{ if(u) out.push(u); }); // 수정에서 추가한 링크
  return [...new Set(out)].slice(0,6);
}
function esc(s){ return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ============================================================
   조회
   ============================================================ */
function allFolders(){ const a=[]; state.categories.forEach(c=>c.folders.forEach(f=>a.push({...f, catId:c.id}))); return a; }
function folderById(id){ return allFolders().find(f=>f.id===id); }
function countInFolder(id){ return state.bookmarks.filter(b=>b.folderId===id).length; }
function countCat(c){ return c.folders.reduce((n,f)=>n+countInFolder(f.id),0); }
function viewBookmarks(){
  const v=state.ui.view;
  let list;
  if(v.type==='all') list = state.bookmarks;
  else if(v.type==='uncat') list = state.bookmarks.filter(b=>!b.folderId || !folderById(b.folderId));
  else list = state.bookmarks.filter(b=>b.folderId===v.folderId);
  const q = (document.getElementById('searchInput').value||'').trim().toLowerCase();
  if(q){
    list = list.filter(b=>(
      (b.content||'').toLowerCase().includes(q) ||
      (b.author||'').toLowerCase().includes(q) ||
      (b.handle||'').toLowerCase().includes(q) ||
      (b.tags||[]).join(' ').toLowerCase().includes(q)
    ));
  }
  const sort = state.ui.sort || 'new';
  if(sort==='new') list = [...list].sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  else if(sort==='old') list = [...list].sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  else if(sort==='name') list = [...list].sort((a,b)=>(a.content||'').trim().localeCompare((b.content||'').trim(),'ko'));
  else if(sort==='custom') list = [...list].sort((a,b)=>(a.order??0)-(b.order??0));
  return list;
}
function viewTitle(){
  const v=state.ui.view;
  if(v.type==='all') return '전체보기';
  if(v.type==='uncat') return '미분류';
  const f=folderById(v.folderId); return f? f.name : '폴더';
}

function applyTheme(){
  const s=state.settings;
  const r=document.documentElement;
  r.style.setProperty('--accent', s.accent);
  r.style.setProperty('--bg', s.bg);
  r.style.setProperty('--text', s.text);
  r.style.setProperty('--font', FONTS[s.font]||FONTS.noto);
  const cols=s.columns;
  r.style.setProperty('--cols',
    (!cols||cols==='auto') ? 'repeat(auto-fill, minmax(240px, 1fr))' : `repeat(${cols}, minmax(0,1fr))`);

  // 강조색 위 글자색
  const ac=s.accent.replace('#','');
  const ar=parseInt(ac.substr(0,2),16), ag=parseInt(ac.substr(2,2),16), ab=parseInt(ac.substr(4,2),16);
  const aLum=(0.299*ar+0.587*ag+0.114*ab)/255;
  r.style.setProperty('--accent-text', aLum>0.62?'#222':'#fff');

  // bg 밝기로 다크/라이트 판별
  const bc=s.bg.replace('#','');
  const br=parseInt(bc.substr(0,2),16), bg2=parseInt(bc.substr(2,2),16), bb=parseInt(bc.substr(4,2),16);
  const bgLum=(0.299*br+0.587*bg2+0.114*bb)/255;
  const isDark = bgLum < 0.35;

  if(isDark){
    // 다크 모드: 카드/서피스를 bg보다 밝게
    r.style.setProperty('--surface',   `color-mix(in srgb, var(--accent) 8%, color-mix(in srgb, #fff 10%, var(--bg)))`);
    r.style.setProperty('--surface-2', `color-mix(in srgb, var(--accent) 14%, color-mix(in srgb, #fff 15%, var(--bg)))`);
    r.style.setProperty('--card',      `color-mix(in srgb, var(--accent) 6%, color-mix(in srgb, #fff 12%, var(--bg)))`);
    r.style.setProperty('--border',    `color-mix(in srgb, var(--accent) 22%, color-mix(in srgb, #fff 18%, var(--bg)))`);
    r.style.setProperty('--border-soft',`color-mix(in srgb, var(--accent) 12%, color-mix(in srgb, #fff 10%, var(--bg)))`);
    r.style.setProperty('--muted',     `color-mix(in srgb, var(--text) 60%, var(--bg))`);
    r.style.setProperty('--shadow',    'rgba(0,0,0,.45)');
    r.style.setProperty('--accent-soft',`color-mix(in srgb, var(--accent) 20%, var(--bg))`);
  } else {
    // 라이트 모드
    r.style.setProperty('--surface',   `color-mix(in srgb, var(--accent) 4%, var(--bg))`);
    r.style.setProperty('--surface-2', `color-mix(in srgb, var(--accent) 9%, var(--bg))`);
    r.style.setProperty('--card',      `color-mix(in srgb, var(--accent) 3%, #fff)`);
    r.style.setProperty('--border',    `color-mix(in srgb, var(--accent) 28%, var(--bg))`);
    r.style.setProperty('--border-soft',`color-mix(in srgb, var(--accent) 16%, var(--bg))`);
    r.style.setProperty('--muted',     `color-mix(in srgb, var(--text) 45%, var(--bg))`);
    r.style.setProperty('--shadow',    'rgba(0,0,0,.08)');
    r.style.setProperty('--accent-soft',`color-mix(in srgb, var(--accent) 12%, var(--bg))`);
  }

  // 로고
  const logo=document.getElementById('logo');
  logo.innerHTML = `<img src="${s.logo||DEFAULT_LOGO}" alt="로고" style="
         width:${s.logoSize||120}px;
         height:auto;
         display:block;">`;
}

function renderSidebar(){
  document.getElementById('cntAll').textContent = state.bookmarks.length;
  document.getElementById('cntUncat').textContent = state.bookmarks.filter(b=>!b.folderId||!folderById(b.folderId)).length;
  const v=state.ui.view;
  document.getElementById('navAll').classList.toggle('active', v.type==='all');
  document.getElementById('navUncat').classList.toggle('active', v.type==='uncat');

  const wrap=document.getElementById('catList'); wrap.innerHTML='';
  state.categories.forEach(cat=>{
    const div=document.createElement('div'); div.className='cat'+(cat.collapsed?' collapsed':'');
    const head=document.createElement('div'); head.className='cat-head';
    head.innerHTML=`<span class="twist">▼</span>
      <span class="name">${esc((cat.emoji?cat.emoji+' ':'')+cat.name)}</span>
      <span class="count">${countCat(cat)}</span>
      <span class="mini" data-act="addFolder" title="폴더 추가">＋</span>
      <span class="mini" data-act="editCat" title="이름/이모지 수정">✎</span>
      <span class="mini" data-act="delCat" title="삭제">🗑</span>`;
    head.addEventListener('click',(e)=>{
      const act=e.target.getAttribute('data-act');
      if(act==='addFolder'){ e.stopPropagation(); addFolder(cat); }
      else if(act==='editCat'){ e.stopPropagation(); editCategory(cat); }
      else if(act==='delCat'){ e.stopPropagation(); delCategory(cat); }
      else { cat.collapsed=!cat.collapsed; save(); renderSidebar(); }
    });
    div.appendChild(head);

    const fwrap=document.createElement('div'); fwrap.className='folders';
    cat.folders.forEach(f=>{
      const fd=document.createElement('div'); fd.className='folder'+(v.type==='folder'&&v.folderId===f.id?' active':'');
      fd.dataset.fid=f.id; fd.dataset.cid=cat.id;
      fd.innerHTML=`<span class="folder-handle" title="드래그해서 순서 변경">⠿</span>
        <span class="fname">${esc(f.name)}</span>
        <span class="count">${countInFolder(f.id)}</span>
        <span class="mini" data-act="editFolder">✎</span>
        <span class="mini" data-act="delFolder">🗑</span>`;
      fd.addEventListener('click',(e)=>{
        const act=e.target.getAttribute('data-act');
        if(act==='editFolder'){ e.stopPropagation(); editFolder(cat,f); }
        else if(act==='delFolder'){ e.stopPropagation(); delFolder(cat,f); }
        else if(!e.target.classList.contains('folder-handle')){ state.ui.view={type:'folder',folderId:f.id}; state.ui.page=1; save(); render(); }
      });
      // 카드→폴더 드롭 (북마크 이동) / 폴더 순서 변경
      fd.addEventListener('dragover',ev=>{
        ev.preventDefault();
        if(draggingFolderId){
          if(draggingFolderId===f.id) return; // 자기 자신은 무시
          const rect=fd.getBoundingClientRect();
          fd.classList.remove('folder-drop-above','folder-drop-below','drop-hot');
          fd.classList.add(ev.clientY<rect.top+rect.height/2?'folder-drop-above':'folder-drop-below');
        } else {
          fd.classList.add('drop-hot');
        }
      });
      fd.addEventListener('dragleave',()=>fd.classList.remove('drop-hot','folder-drop-above','folder-drop-below'));
      fd.addEventListener('drop',ev=>{
        const cls=fd.classList; cls.remove('drop-hot','folder-drop-above','folder-drop-below');
        if(draggingFolderId && draggingFolderId!==f.id){
          ev.preventDefault(); ev.stopPropagation();
          const [srcCid,srcFid]=ev.dataTransfer.getData('folder-drag').split('::');
          const rect=fd.getBoundingClientRect();
          reorderFolder(srcCid,srcFid,cat.id,f.id, ev.clientY<rect.top+rect.height/2);
        } else if(!draggingFolderId){
          ev.preventDefault(); moveBookmark(ev.dataTransfer.getData('text'), f.id);
        }
      });
      // 폴더 핸들 드래그
      const handle=fd.querySelector('.folder-handle');
      fd.draggable=false;
      handle.addEventListener('mousedown',()=>{ fd.draggable=true; });
      handle.addEventListener('mouseup',()=>{ fd.draggable=false; });
      fd.addEventListener('dragstart',ev=>{
        if(!fd.draggable) { ev.preventDefault(); return; }
        ev.dataTransfer.setData('folder-drag', `${cat.id}::${f.id}`);
        ev.dataTransfer.effectAllowed='move';
        draggingFolderId=f.id;
        setTimeout(()=>fd.classList.add('folder-dragging'),0);
      });
      fd.addEventListener('dragend',()=>{
        fd.draggable=false;
        fd.classList.remove('folder-dragging');
        draggingFolderId=null;
        document.querySelectorAll('.folder').forEach(el=>el.classList.remove('folder-drop-above','folder-drop-below'));
      });
      fwrap.appendChild(fd);
    });
    div.appendChild(fwrap);
    wrap.appendChild(div);
  });
}

function renderMain(){
  document.getElementById('mainTitle').textContent = viewTitle();
  const sortSel=document.getElementById('sortSel'); if(sortSel) sortSel.value=state.ui.sort||'new';
  const cards=document.getElementById('cards'); cards.innerHTML='';
  const list=viewBookmarks();
  if(!list.length){ cards.innerHTML='<div class="empty">표시할 북마크가 없어요.<br>좌측 [불러오기]로 CSV를 가져오거나 다른 폴더를 선택해 보세요.</div>'; return; }
  if(state.ui.sort==='custom'){
    cards.insertAdjacentHTML('beforeend','<div class="empty" style="padding:6px 0 0;grid-column:1/-1;font-size:12.5px">↕ 카드를 드래그해 순서를 바꿀 수 있어요</div>');
  }
  const perPage=state.ui.perPage||50;
  const pages=Math.max(1, Math.ceil(list.length/perPage));
  if(!state.ui.page || state.ui.page<1) state.ui.page=1;
  if(state.ui.page>pages) state.ui.page=pages;
  const page=state.ui.page, start=(page-1)*perPage;
  list.slice(start, start+perPage).forEach(bm=>{ const c=makeCard(bm); if(selMode){ c.classList.add('sel-mode'); if(selIds.has(bm.id)) c.classList.add('selected'); } cards.appendChild(c); });
  cards.appendChild(makePager(list.length, page, pages, perPage));
}
function gotoPage(p){ state.ui.page=p; save(); renderMain(); const c=document.getElementById('cards'); if(c) c.scrollTop=0; }
function makePager(total, page, pages, perPage){
  const wrap=document.createElement('div'); wrap.className='pager';
  const center=document.createElement('div'); center.className='pager-center';
  const nav=document.createElement('div'); nav.className='pager-nav';
  const mk=(label,p,o={})=>{ const b=document.createElement('button');
    b.className='page-btn'+(o.active?' active':'')+(o.dis?' dis':''); b.textContent=label;
    if(o.dis) b.disabled=true; else if(!o.active && p) b.onclick=()=>gotoPage(p); return b; };
  nav.appendChild(mk('‹', page-1, {dis:page<=1}));
  const win=2; let s=Math.max(1,page-win), e=Math.min(pages,page+win);
  if(s>1){ nav.appendChild(mk('1',1,{active:page===1})); if(s>2) nav.appendChild(mk('…',null,{dis:true})); }
  for(let p=s;p<=e;p++) nav.appendChild(mk(String(p),p,{active:p===page}));
  if(e<pages){ if(e<pages-1) nav.appendChild(mk('…',null,{dis:true})); nav.appendChild(mk(String(pages),pages,{active:page===pages})); }
  nav.appendChild(mk('›', page+1, {dis:page>=pages}));
  center.appendChild(nav);

  const info=document.createElement('div'); info.className='pager-info';
  const from=total?((page-1)*perPage+1):0, to=Math.min(total,page*perPage);
  info.textContent=`${from}–${to} / 총 ${total}개`;
  center.appendChild(info);

  const pp=document.createElement('div'); pp.className='pager-pp';
  [20,30,50,100].forEach(n=>{ const b=document.createElement('button'); b.className='pp-btn'+(perPage===n?' active':''); b.textContent=n+'개';
    b.onclick=()=>{ state.ui.perPage=n; state.ui.page=1; save(); renderMain(); const c=document.getElementById('cards'); if(c) c.scrollTop=0; }; pp.appendChild(b); });

  wrap.appendChild(document.createElement('div')); // 좌측 여백
  wrap.appendChild(center);
  wrap.appendChild(pp);
  return wrap;
}

function makeCard(bm){
  const card=document.createElement('div'); card.className='card'; card.draggable=true; card.dataset.bmid=bm.id;
  const tags=(bm.tags||[]).map(t=>`<span class="pill">${esc(t)}</span>`).join('');
  const who=esc([bm.author,bm.handle].filter(Boolean).join(' | '));
  const content=esc(truncByNonSpace(bm.content,140))||'<span style="color:var(--muted)">(내용 없음)</span>';
  const links=cardLinks(bm).slice(0,2).map(u=>`<a href="${esc(u)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">🔗 ${esc(shortUrl(u))}</a>`).join('');
  const inner = bm.imageUrl
    ? `<span class="imgph">🖼️</span><img class="card-img" referrerpolicy="no-referrer" loading="lazy" alt="" src="${esc(bm.imageUrl)}" onerror="this.remove()">`
    : `<img class="card-img card-img-logo" alt="" src="${esc(state.settings.logo||DEFAULT_LOGO)}">`;
  card.innerHTML=`
    <div class="card-check">✓</div>
    <div class="card-imgwrap">${inner}${bm.hasVideo?'<span class="vid-badge">▶ 동영상</span>':''}</div>
    <div class="card-body">
      ${tags?`<div class="card-tags">${tags}</div>`:''}
      ${who?`<div class="card-author">${who}</div>`:''}
      <div class="card-content">${content}</div>
      ${links?`<div class="card-links">${links}</div>`:''}
    </div>
    <div class="card-foot">
      <button class="mini-btn move left">📁 이동</button>
      <button class="mini-btn edit">수정</button>
      <button class="mini-btn del">삭제</button>
    </div>`;
  card.querySelector('.move').onclick=e=>{e.stopPropagation(); openMovePicker(bm,e.target);};
  card.querySelector('.edit').onclick=e=>{e.stopPropagation(); editBookmark(bm);};
  card.querySelector('.del').onclick=e=>{e.stopPropagation(); delBookmark(bm);};
  card.addEventListener('click',()=>{
    if(selMode){ toggleSelCard(bm.id, card); return; }
    openFull(bm);
  });
  card.addEventListener('dragstart',e=>{ e.dataTransfer.setData('text',bm.id); card.classList.add('dragging'); });
  card.addEventListener('dragend',()=>card.classList.remove('dragging'));
  card.addEventListener('dragover',e=>{ if(state.ui.sort==='custom'){ e.preventDefault(); card.classList.add('reorder-hot'); }});
  card.addEventListener('dragleave',()=>card.classList.remove('reorder-hot'));
  card.addEventListener('drop',e=>{ if(state.ui.sort!=='custom') return; e.preventDefault(); e.stopPropagation(); card.classList.remove('reorder-hot'); reorderCustom(e.dataTransfer.getData('text'), bm.id); });
  return card;
}

function render(){ applyTheme(); renderSidebar(); renderMain(); document.getElementById('sidebar').style.width=state.ui.sidebarWidth+'px'; }

/* ========== 선택 모드 ========== */
let selMode = false;
let selIds = new Set();
let skipDelConfirm = false;
let draggingFolderId = null;

function enterSelMode(){
  selMode=true; selIds.clear();
  document.getElementById('selBar').classList.add('active');
  document.getElementById('btnSelect').classList.add('active');
  updateSelBar();
  document.querySelectorAll('.card').forEach(c=>c.classList.add('sel-mode'));
}
function exitSelMode(){
  selMode=false; selIds.clear();
  document.getElementById('selBar').classList.remove('active');
  document.getElementById('btnSelect').classList.remove('active');
  document.querySelectorAll('.card').forEach(c=>{ c.classList.remove('sel-mode','selected'); });
}
function toggleSelCard(id, card){
  if(selIds.has(id)){ selIds.delete(id); card.classList.remove('selected'); }
  else { selIds.add(id); card.classList.add('selected'); }
  updateSelBar();
}
function updateSelBar(){
  document.getElementById('selInfo').textContent=`${selIds.size}개 선택됨`;
}

document.getElementById('btnSelect').onclick=()=>{ selMode ? exitSelMode() : enterSelMode(); };
document.getElementById('btnSelCancel').onclick=()=>exitSelMode();

// 전체 선택: 현재 페이지 카드 전부
document.getElementById('btnSelAll').onclick=()=>{
  const allSelected = document.querySelectorAll('.card.selected').length === document.querySelectorAll('.card.sel-mode').length;
  if(allSelected){
    // 이미 전체 선택이면 해제
    document.querySelectorAll('.card.sel-mode').forEach(c=>c.classList.remove('selected'));
    selIds.clear();
  } else {
    document.querySelectorAll('.card.sel-mode').forEach(c=>{
      const id=c.dataset.bmid; if(id){ selIds.add(id); c.classList.add('selected'); }
    });
  }
  updateSelBar();
};

// 선택 삭제
document.getElementById('btnSelDel').onclick=()=>{
  if(!selIds.size) return;
  if(skipDelConfirm){
    doSelDelete();
  } else {
    showSelDelConfirm();
  }
};
function showSelDelConfirm(){
  const ov=document.createElement('div'); ov.className='modal-overlay'; ov.id='selDelOverlay';
  ov.innerHTML=`<div class="modal" style="max-width:380px">
    <h2 style="margin:0 0 12px">선택 삭제</h2>
    <p style="margin:0 0 18px;color:var(--muted)">선택한 <b style="color:var(--accent)">${selIds.size}개</b>의 북마크를 삭제할까요?<br>이 작업은 되돌릴 수 없어요.</p>
    <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);margin-bottom:18px;cursor:pointer">
      <input type="checkbox" id="chkSkipConfirm"> 다시 묻지 않기
    </label>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="btn" id="selDelCancelBtn">취소</button>
      <button class="btn primary" id="selDelOkBtn">삭제</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
  ov.querySelector('#selDelCancelBtn').onclick=()=>ov.remove();
  ov.querySelector('#selDelOkBtn').onclick=()=>{
    if(ov.querySelector('#chkSkipConfirm').checked) skipDelConfirm=true;
    ov.remove(); doSelDelete();
  };
  ov.addEventListener('click',e=>{ if(e.target===ov) ov.remove(); });
}
function doSelDelete(){
  state.bookmarks=state.bookmarks.filter(b=>!selIds.has(b.id));
  save(); exitSelMode(); renderSidebar(); renderMain();
}

// 선택 이동
document.getElementById('btnSelMove').onclick=()=>{
  if(!selIds.size) return;
  let opts=''; state.categories.forEach(c=>{ c.folders.forEach(f=>{ opts+=`<option value="${f.id}">${esc(c.emoji||'')} ${esc(c.name)} / ${esc(f.name)}</option>`; }); });
  if(!opts){ showToast('이동할 폴더가 없어요. 먼저 카테고리와 폴더를 만들어 주세요.'); return; }
  const ov=document.createElement('div'); ov.className='modal-overlay';
  ov.innerHTML=`<div class="modal" style="max-width:380px">
    <h2 style="margin:0 0 12px">선택 이동</h2>
    <p style="margin:0 0 10px;color:var(--muted)"><b style="color:var(--accent)">${selIds.size}개</b>의 북마크를 이동할 폴더를 선택해 주세요.</p>
    <select id="selMoveFolder" style="width:100%;margin-bottom:18px;padding:9px 12px;border:1px solid var(--border);border-radius:10px;background:var(--card);color:var(--text);font-family:inherit;font-size:14px">${opts}</select>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="btn" id="selMoveCancelBtn">취소</button>
      <button class="btn primary" id="selMoveOkBtn">이동</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
  ov.querySelector('#selMoveCancelBtn').onclick=()=>ov.remove();
  ov.querySelector('#selMoveOkBtn').onclick=()=>{
    const fid=ov.querySelector('#selMoveFolder').value;
    state.bookmarks.forEach(b=>{ if(selIds.has(b.id)) b.folderId=fid; });
    save(); ov.remove(); exitSelMode(); renderSidebar(); renderMain();

function reorderFolder(srcCid, srcFid, tgtCid, tgtFid, before){
  const srcCat=state.categories.find(c=>c.id===srcCid);
  const tgtCat=state.categories.find(c=>c.id===tgtCid);
  if(!srcCat||!tgtCat) return;
  const srcIdx=srcCat.folders.findIndex(f=>f.id===srcFid);
  if(srcIdx<0) return;
  const [folder]=srcCat.folders.splice(srcIdx,1);
  const tgtIdx=tgtCat.folders.findIndex(f=>f.id===tgtFid);
  tgtCat.folders.splice(before ? tgtIdx : tgtIdx+1, 0, folder);
  save(); renderSidebar();
}

function moveBookmark(bmId, folderId){
  const bm=state.bookmarks.find(b=>b.id===bmId); if(!bm) return;
  bm.folderId=folderId; save(); render();
}
function reorderCustom(draggedId, targetId){
  if(!draggedId || draggedId===targetId) return;
  let full=[...state.bookmarks].sort((a,b)=>(a.order??0)-(b.order??0));
  const di=full.findIndex(b=>b.id===draggedId); if(di<0) return;
  const dragged=full.splice(di,1)[0];
  const ti=full.findIndex(b=>b.id===targetId);
  full.splice(ti<0?full.length:ti, 0, dragged);
  full.forEach((b,i)=>b.order=i);
  save(); renderMain();
}
function findDupGroups(){
  const map=new Map();
  state.bookmarks.forEach(b=>{
    const key = b.postUrl ? 'u:'+b.postUrl : 'c:'+(b.content||'').trim()+'|'+(b.author||'');
    if(key==='c:|') return; // 완전 빈 항목은 제외
    if(!map.has(key)) map.set(key,[]);
    map.get(key).push(b);
  });
  return [...map.values()].filter(g=>g.length>1);
}
function openDuplicateCheck(){
  const groups=findDupGroups();
  if(!groups.length){
    openModal(`<h2>중복 확인</h2><p style="color:var(--muted)">중복된 북마크가 없어요. 깔끔합니다! ✨</p>
      <div class="modal-actions"><button class="btn primary" onclick="closeModal()">닫기</button></div>`);
    return;
  }
  const extra=groups.reduce((n,g)=>n+g.length-1,0);
  const listHtml=groups.slice(0,40).map(g=>{
    const b=g[0]; const label=esc(truncByNonSpace(b.content||b.postUrl||'(내용 없음)',40));
    return `<div class="dup-group"><div class="dup-title">${label}</div>
      <div class="dup-meta">${g.length}개 중복 · 기준: ${b.postUrl?'게시물 링크':'내용+작성자'}</div></div>`;
  }).join('');
  openModal(`<h2>중복 확인</h2>
    <p style="margin-top:0;color:var(--text)"><b>${groups.length}개 묶음</b>에서 총 <b>${extra}개</b>의 중복 항목을 찾았어요.</p>
    ${listHtml}${groups.length>40?'<div class="hint">…외 더 있음</div>':''}
    <div class="hint">정리하면 각 묶음에서 1개만 남기고 나머지를 삭제해요. (폴더가 지정된 항목을 우선 보존)</div>
    <div class="modal-actions">
      <button class="btn ghost" onclick="closeModal()">닫기</button>
      <button class="btn primary" id="okDedup">중복 ${extra}개 정리</button>
    </div>`);
  document.getElementById('okDedup').onclick=()=>{
    const remove=new Set();
    groups.forEach(g=>{
      const keep = g.find(b=>b.folderId) || g[0];
      g.forEach(b=>{ if(b!==keep) remove.add(b.id); });
    });
    state.bookmarks=state.bookmarks.filter(b=>!remove.has(b.id));
    save(); render(); closeModal();
    showToast(`중복 ${remove.size}개를 정리했어요.`);
  };
}

}

function exportBackup(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`북마크정리기_백업_${new Date().toISOString().slice(0,10)}.json`; a.click(); URL.revokeObjectURL(a.href);
}

/* ============================================================
   파일 입력 핸들러
   ============================================================ */
document.getElementById('btnLoad').onclick=()=>document.getElementById('csvFile').click();
document.getElementById('csvFile').onchange=e=>{
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader(); r.onload=()=>{ const n=importCSV(r.result); state.ui.page=1; render(); showToast(n+'개의 새 북마크를 불러왔어요. (이미 있던 항목은 건너뜀)'); };
  r.readAsText(f,'utf-8'); e.target.value='';
};
document.getElementById('backupFile').onchange=e=>{
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader(); r.onload=()=>{ try{ const d=JSON.parse(r.result); state=Object.assign(state,d); save(); render(); closeModal(); showToast('백업을 불러왔어요.'); }catch(err){ showToast('백업 파일을 읽을 수 없어요.'); } };
  r.readAsText(f,'utf-8'); e.target.value='';
};
document.getElementById('logoFile').onchange=e=>{
  const f=e.target.files[0]; if(!f) return;
  const isGif = /gif/i.test(f.type) || /\.gif$/i.test(f.name);
  const r=new FileReader();
  r.onload=()=>{
    if(isGif){ state.settings.logo=r.result; save(); applyTheme(); return; } // GIF는 애니메이션 유지 위해 원본
    const im=new Image();
    im.onload=()=>{
      const MAX=500; let w=im.naturalWidth||im.width, h=im.naturalHeight||im.height;
      if(w>MAX || h>MAX){ const s=Math.min(MAX/w, MAX/h); w=Math.round(w*s); h=Math.round(h*s); }
      const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
      cv.getContext('2d').drawImage(im,0,0,w,h);
      const type=/png/i.test(f.type)?'image/png':'image/jpeg';
      try{ state.settings.logo=cv.toDataURL(type, 0.92); }catch(err){ state.settings.logo=r.result; }
      save(); applyTheme();
    };
    im.onerror=()=>{ state.settings.logo=r.result; save(); applyTheme(); };
    im.src=r.result;
  };
  r.readAsDataURL(f); e.target.value='';
};

document.getElementById('btnCreate').onclick=openCreate;
document.getElementById('btnSettings').onclick=openSettings;
document.getElementById('navAll').onclick=()=>{ state.ui.view={type:'all'}; state.ui.page=1; save(); render(); };
document.getElementById('navUncat').onclick=()=>{ state.ui.view={type:'uncat'}; state.ui.page=1; save(); render(); };
['navAll','navUncat'].forEach(id=>{ const el=document.getElementById(id);
  el.addEventListener('dragover',ev=>{ev.preventDefault(); el.classList.add('drop-hot');});
  el.addEventListener('dragleave',()=>el.classList.remove('drop-hot'));
  el.addEventListener('drop',ev=>{ev.preventDefault(); el.classList.remove('drop-hot'); if(id==='navUncat') moveBookmark(ev.dataTransfer.getData('text'),null);});
});
document.getElementById('searchInput').oninput=()=>{ state.ui.page=1; renderMain(); };
document.getElementById('btnDup').onclick=openDuplicateCheck;
document.getElementById('sortSel').onchange=e=>{ state.ui.sort=e.target.value; state.ui.page=1; save(); renderMain(); };

/* ---------- 리사이저 ---------- */
(function(){
  const rz=document.getElementById('resizer'), sb=document.getElementById('sidebar'); let dragging=false;
  rz.addEventListener('mousedown',()=>{ dragging=true; rz.classList.add('drag'); document.body.style.cursor='col-resize'; document.body.style.userSelect='none'; });
  window.addEventListener('mousemove',e=>{ if(!dragging) return; let w=Math.min(520,Math.max(175,e.clientX)); sb.style.width=w+'px'; state.ui.sidebarWidth=w; });
  window.addEventListener('mouseup',()=>{ if(dragging){ dragging=false; rz.classList.remove('drag'); document.body.style.cursor=''; document.body.style.userSelect=''; save(); } });
})();

/* ---------- 시작 ---------- */
load(); render();

/* ---------- 사이드바 접기/펼치기 ---------- */
function applySidebarCollapsed(){
  const sb=document.getElementById('sidebar');
  const rz=document.getElementById('resizer');
  const btn=document.getElementById('toggleSidebar');
  const c=!!state.ui.sidebarCollapsed;
  sb.classList.toggle('collapsed', c);
  if(rz) rz.classList.toggle('collapsed', c);
  if(btn) btn.textContent = c ? '☰' : '◀';
}
document.getElementById('toggleSidebar').onclick=()=>{
  state.ui.sidebarCollapsed=!state.ui.sidebarCollapsed; save(); applySidebarCollapsed();
};
applySidebarCollapsed();
</script>
<!-- 업데이트 알림 배너 -->
<div class="update-bar" id="updateBar">
  <span id="updateMsg">새 버전이 있어요!</span>
  <button class="upd-btn" id="updInstallBtn">설치하기</button>
  <button class="upd-close" id="updCloseBtn" title="닫기">✕</button>
</div>

<style>
  .update-bar{
    display:none; position:fixed; bottom:24px; right:24px; z-index:9999;
    background:var(--accent); color:var(--accent-text);
    padding:14px 20px; border-radius:14px; box-shadow:0 4px 20px rgba(0,0,0,.25);
    font-size:14px; font-weight:700; align-items:center; gap:12px;
    animation: slideUp .3s ease;
  }
  .update-bar.show{display:flex}
  @keyframes slideUp{ from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  .update-bar .upd-btn{
    padding:6px 14px; border-radius:999px; border:2px solid var(--accent-text);
    background:transparent; color:var(--accent-text); font-weight:700;
    font-size:13px; cursor:pointer; white-space:nowrap;
  }
  .update-bar .upd-btn:hover{background:rgba(255,255,255,.2)}
  .update-bar .upd-close{
    background:none; border:none; color:var(--accent-text);
    font-size:18px; cursor:pointer; padding:0 0 0 4px; opacity:.7;
  }
  .update-bar .upd-close:hover{opacity:1}
</style>

<script>
// Electron 자동 업데이트 UI (브라우저에서 열면 electronAPI가 없으므로 안전하게 조건 처리)
if (window.electronAPI) {
  const bar   = document.getElementById('updateBar');
  const msg   = document.getElementById('updateMsg');
  const inst  = document.getElementById('updInstallBtn');
  const close = document.getElementById('updCloseBtn');

  // 새 버전 감지 → 배너 표시
  window.electronAPI.onUpdateAvailable((version) => {
    msg.textContent = `새 버전 ${version} 다운로드 중…`;
    inst.style.display = 'none';
    bar.classList.add('show');
  });

  // 다운로드 진행률
  window.electronAPI.onUpdateProgress((percent) => {
    msg.textContent = `다운로드 중… ${percent}%`;
  });

  // 다운로드 완료 → 설치 버튼 활성화
  window.electronAPI.onUpdateDownloaded(() => {
    msg.textContent = '새 버전 준비 완료!';
    inst.style.display = '';
  });

  // 설치하기
  inst.onclick = () => window.electronAPI.installUpdate();

  // 닫기
  close.onclick = () => bar.classList.remove('show');
}
</script>
</body>
